apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: databricks-connector
  annotations:
    description: "Submit, monitor, and retrieve results from Databricks jobs using the pipekit/databricks-connector."
spec:
  entrypoint: run-job
  templates:
  - name: run-job
    inputs:
      parameters:
      # Required
      - name: code-path
        description: "Path to the code (Notebook path, Python file path, or JAR URI)"
      
      # Task Type
      - name: task-type
        value: "notebook"
        enum: ["notebook", "spark-python", "spark-jar"]
        description: "Type of task: notebook, spark-python, or spark-jar"
      - name: main-class-name
        value: ""
        description: "Main class name (Required for spark-jar)"
      - name: args
        value: ""
        description: "Comma-separated positional arguments for the job (e.g. arg1,arg2)"

      # Run Info
      - name: run-name
        value: "argo-workflow-run"
        description: "Name of the job run"
      - name: task-key
        value: "main_task"
        description: "Key for the task"

      # Cluster Mode
      - name: cluster-mode
        value: "New"
        enum: ["New", "Existing", "Serverless"]
        description: "Cluster mode: New (job cluster), Existing (reuse cluster), or Serverless"

      # Cluster Config (Existing)
      - name: existing-cluster-id
        value: ""
        description: "ID of an existing cluster (Required if cluster-mode is Existing)"
      
      # Cluster Config (New)
      - name: new-cluster-node-type
        value: ""
        description: "Node type (Required if cluster-mode is New, unless using instance pool)"
      - name: new-cluster-spark-version
        value: ""
        description: "Spark version (Required if cluster-mode is New)"
      - name: instance-pool-id
        value: ""
        description: "Instance pool ID for new cluster"
      - name: policy-id
        value: ""
        description: "Policy ID for new cluster"
      - name: spark-conf
        value: ""
        description: "Spark configuration (comma-separated key=value)"
      
      # Scaling Configuration
      - name: scaling-type
        value: "fixed"
        enum: ["fixed", "autoscale"]
        description: "Scaling strategy for the cluster"
      - name: new-cluster-num-workers
        value: "1"
        description: "Number of workers (if fixed scaling)"
      - name: min-workers
        value: "1"
        description: "Min workers (if autoscale)"
      - name: max-workers
        value: "2"
        description: "Max workers (if autoscale)"

      # Cloud / Availability
      - name: cloud-provider
        value: ""
        enum: ["AWS", "AZURE", "GCP", ""]
        description: "Cloud provider for availability settings (AWS, AZURE, GCP)"
      - name: availability
        value: ""
        enum: ["SPOT", "ON_DEMAND", ""]
        description: "Instance availability (SPOT or ON_DEMAND)"

      # Job Config
      - name: job-parameters
        value: ""
        description: "Comma-separated parameters (e.g., key1=value1,key2=value2) - legacy named params"
      - name: email-notifications
        value: ""
        description: "Comma-separated list of emails for notifications"
      # Auth
      - name: databricks-secret-name
        value: "databricks-secret"
        description: "Name of the K8s Secret containing DATABRICKS_HOST and DATABRICKS_TOKEN"
      - name: connector-image
        value: "ghcr.io/pipekit/databricks-connector:0.0.2"
        description: "Container image for the Databricks connector"

    outputs:
      parameters:
      - name: run-id
        valueFrom:
          parameter: "{{steps.submit.outputs.result}}"
      - name: run-url
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.run-url}}"
      - name: result
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.result}}"
      - name: state
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.state}}"
      - name: json
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.json}}"

    steps:
    - - name: submit
        template: submit
        arguments:
          parameters:
          - name: code-path
            value: "{{inputs.parameters.code-path}}"
          - name: task-type
            value: "{{inputs.parameters.task-type}}"
          - name: main-class-name
            value: "{{inputs.parameters.main-class-name}}"
          - name: args
            value: "{{inputs.parameters.args}}"
          - name: run-name
            value: "{{inputs.parameters.run-name}}"
          - name: task-key
            value: "{{inputs.parameters.task-key}}"
          - name: cluster-mode
            value: "{{inputs.parameters.cluster-mode}}"
          - name: existing-cluster-id
            value: "{{inputs.parameters.existing-cluster-id}}"
          - name: new-cluster-node-type
            value: "{{inputs.parameters.new-cluster-node-type}}"
          - name: new-cluster-spark-version
            value: "{{inputs.parameters.new-cluster-spark-version}}"
          - name: instance-pool-id
            value: "{{inputs.parameters.instance-pool-id}}"
          - name: policy-id
            value: "{{inputs.parameters.policy-id}}"
          - name: spark-conf
            value: "{{inputs.parameters.spark-conf}}"
          - name: scaling-type
            value: "{{inputs.parameters.scaling-type}}"
          - name: new-cluster-num-workers
            value: "{{inputs.parameters.new-cluster-num-workers}}"
          - name: min-workers
            value: "{{inputs.parameters.min-workers}}"
          - name: max-workers
            value: "{{inputs.parameters.max-workers}}"
          - name: cloud-provider
            value: "{{inputs.parameters.cloud-provider}}"
          - name: availability
            value: "{{inputs.parameters.availability}}"
          - name: job-parameters
            value: "{{inputs.parameters.job-parameters}}"
          - name: email-notifications
            value: "{{inputs.parameters.email-notifications}}"
          - name: databricks-secret-name
            value: "{{inputs.parameters.databricks-secret-name}}"
          - name: connector-image
            value: "{{inputs.parameters.connector-image}}"

    - - name: monitor
        template: monitor
        arguments:
          parameters:
          - name: run-id
            value: "{{steps.submit.outputs.result}}"
          - name: databricks-secret-name
            value: "{{inputs.parameters.databricks-secret-name}}"
          - name: connector-image
            value: "{{inputs.parameters.connector-image}}"

    - - name: get-output
        template: get-output
        arguments:
          parameters:
          - name: run-id
            value: "{{steps.submit.outputs.result}}"
          - name: databricks-secret-name
            value: "{{inputs.parameters.databricks-secret-name}}"
          - name: connector-image
            value: "{{inputs.parameters.connector-image}}"

  - name: run-existing-job
    inputs:
      parameters:
      # Required
      - name: job-id
        description: "ID of the existing Databricks job to start"
      
      # Optional Parameters
      - name: job-parameters
        value: ""
        description: "Comma-separated parameters (e.g., key1=value1,key2=value2)"
      - name: notebook-params
        value: ""
        description: "Notebook parameters (key=value)"
      - name: python-params
        value: ""
        description: "Python parameters (positional)"
      - name: jar-params
        value: ""
        description: "JAR parameters (positional)"
      - name: spark-submit-params
        value: ""
        description: "Spark submit parameters (positional)"
      
      # Auth
      - name: databricks-secret-name
        value: "databricks-secret"
        description: "Name of the K8s Secret containing DATABRICKS_HOST and DATABRICKS_TOKEN"
      - name: connector-image
        value: "ghcr.io/pipekit/databricks-connector:0.0.2"
        description: "Container image for the Databricks connector"

    outputs:
      parameters:
      - name: run-id
        valueFrom:
          parameter: "{{steps.start.outputs.result}}"
      - name: run-url
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.run-url}}"
      - name: result
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.result}}"
      - name: state
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.state}}"
      - name: json
        valueFrom:
          parameter: "{{steps.get-output.outputs.parameters.json}}"

    steps:
    - - name: start
        template: start
        arguments:
          parameters:
          - name: job-id
            value: "{{inputs.parameters.job-id}}"
          - name: job-parameters
            value: "{{inputs.parameters.job-parameters}}"
          - name: notebook-params
            value: "{{inputs.parameters.notebook-params}}"
          - name: python-params
            value: "{{inputs.parameters.python-params}}"
          - name: jar-params
            value: "{{inputs.parameters.jar-params}}"
          - name: spark-submit-params
            value: "{{inputs.parameters.spark-submit-params}}"
          - name: databricks-secret-name
            value: "{{inputs.parameters.databricks-secret-name}}"
          - name: connector-image
            value: "{{inputs.parameters.connector-image}}"

    - - name: monitor
        template: monitor
        arguments:
          parameters:
          - name: run-id
            value: "{{steps.start.outputs.result}}"
          - name: databricks-secret-name
            value: "{{inputs.parameters.databricks-secret-name}}"
          - name: connector-image
            value: "{{inputs.parameters.connector-image}}"

    - - name: get-output
        template: get-output
        arguments:
          parameters:
          - name: run-id
            value: "{{steps.start.outputs.result}}"
          - name: databricks-secret-name
            value: "{{inputs.parameters.databricks-secret-name}}"
          - name: connector-image
            value: "{{inputs.parameters.connector-image}}"

  # --- Sub-Templates ---

  - name: submit
    inputs:
      parameters:
      - name: code-path
      - name: task-type
      - name: main-class-name
      - name: args
      - name: run-name
      - name: task-key
      - name: cluster-mode
      - name: existing-cluster-id
      - name: new-cluster-node-type
      - name: new-cluster-spark-version
      - name: instance-pool-id
      - name: policy-id
      - name: spark-conf
      - name: scaling-type
      - name: new-cluster-num-workers
      - name: min-workers
      - name: max-workers
      - name: cloud-provider
      - name: availability
      - name: job-parameters
      - name: email-notifications
      - name: databricks-secret-name
      - name: connector-image
    container:
      image: "{{inputs.parameters.connector-image}}"
      command: ["/databricks-connector", "submit"]
      args:
      - "--code-path={{inputs.parameters.code-path}}"
      - "--task-type={{inputs.parameters.task-type}}"
      - "--main-class-name={{inputs.parameters.main-class-name}}"
      - "--args={{inputs.parameters.args}}"
      - "--run-name={{inputs.parameters.run-name}}"
      - "--task-key={{inputs.parameters.task-key}}"
      - "--cluster-mode={{inputs.parameters.cluster-mode}}"
      - "--existing-cluster-id={{inputs.parameters.existing-cluster-id}}"
      - "--new-cluster-node-type={{inputs.parameters.new-cluster-node-type}}"
      - "--new-cluster-spark-version={{inputs.parameters.new-cluster-spark-version}}"
      - "--instance-pool-id={{inputs.parameters.instance-pool-id}}"
      - "--policy-id={{inputs.parameters.policy-id}}"
      - "--spark-conf={{inputs.parameters.spark-conf}}"
      - "--scaling-type={{inputs.parameters.scaling-type}}"
      - "--new-cluster-num-workers={{inputs.parameters.new-cluster-num-workers}}"
      - "--min-workers={{inputs.parameters.min-workers}}"
      - "--max-workers={{inputs.parameters.max-workers}}"
      - "--cloud-provider={{inputs.parameters.cloud-provider}}"
      - "--availability={{inputs.parameters.availability}}"
      - "--parameters={{inputs.parameters.job-parameters}}"
      - "--email-notifications={{inputs.parameters.email-notifications}}"
      env:
      - name: DATABRICKS_HOST
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: host
      - name: DATABRICKS_TOKEN
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: token
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 128Mi

  - name: start
    inputs:
      parameters:
      - name: job-id
      - name: job-parameters
      - name: notebook-params
        value: ""
      - name: python-params
        value: ""
      - name: jar-params
        value: ""
      - name: spark-submit-params
        value: ""
      - name: databricks-secret-name
      - name: connector-image
    container:
      image: "{{inputs.parameters.connector-image}}"
      command: ["/databricks-connector", "start"]
      args:
      - "--job-id={{inputs.parameters.job-id}}"
      - "--job-params={{inputs.parameters.job-parameters}}"
      - "--notebook-params={{inputs.parameters.notebook-params}}"
      - "--python-params={{inputs.parameters.python-params}}"
      - "--jar-params={{inputs.parameters.jar-params}}"
      - "--spark-submit-params={{inputs.parameters.spark-submit-params}}"
      env:
      - name: DATABRICKS_HOST
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: host
      - name: DATABRICKS_TOKEN
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: token
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 128Mi

  - name: monitor
    inputs:
      parameters:
      - name: run-id
      - name: databricks-secret-name
      - name: poll-interval
        value: "10s"
      - name: connector-image
    container:
      image: "{{inputs.parameters.connector-image}}"
      command: ["/databricks-connector", "monitor"]
      args:
      - "--run-id={{inputs.parameters.run-id}}"
      - "--interval={{inputs.parameters.poll-interval}}"
      env:
      - name: DATABRICKS_HOST
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: host
      - name: DATABRICKS_TOKEN
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: token
      resources:
        requests:
          cpu: 50m
          memory: 64Mi

  - name: get-output
    inputs:
      parameters:
      - name: run-id
      - name: databricks-secret-name
      - name: connector-image
    outputs:
      parameters:
      - name: run-url
        valueFrom:
          path: /tmp/url
      - name: result
        valueFrom:
          path: /tmp/result
          default: "No result found"
      - name: state
        valueFrom:
          path: /tmp/state
      - name: json
        valueFrom:
          path: /tmp/json
    container:
      image: "{{inputs.parameters.connector-image}}"
      command: ["/databricks-connector", "get-output"]
      args:
      - "--run-id={{inputs.parameters.run-id}}"
      - "--write-url=/tmp/url"
      - "--write-result=/tmp/result"
      - "--write-state=/tmp/state"
      - "--write-json=/tmp/json"
      env:
      - name: DATABRICKS_HOST
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: host
      - name: DATABRICKS_TOKEN
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: token
      resources:
        requests:
          cpu: 50m
          memory: 64Mi

  - name: cancel
    inputs:
      parameters:
      - name: run-id
      - name: databricks-secret-name
      - name: connector-image
    container:
      image: "{{inputs.parameters.connector-image}}"
      command: ["/databricks-connector", "cancel"]
      args:
      - "--run-id={{inputs.parameters.run-id}}"
      env:
      - name: DATABRICKS_HOST
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: host
      - name: DATABRICKS_TOKEN
        valueFrom:
          secretKeyRef:
            name: "{{inputs.parameters.databricks-secret-name}}"
            key: token
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
