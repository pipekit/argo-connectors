apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: argo-connectors-ci-
spec:
  entrypoint: main
  templates:
    - name: main
      dag:
        tasks:
          - name: test-spark-connector-jvm
            templateRef:
              name: spark-data-connector-jvm
              template: spark
              clusterScope: true
            arguments:
              parameters:
                - name: type
                  value: "Scala"
                - name: mainClass
                  value: "org.apache.spark.examples.SparkPi"
                - name: globalImage
                  value: "gcr.io/spark-operator/spark:v3.1.1"
                - name: mainApplicationFile
                  value: "local:///opt/spark/examples/jars/spark-examples_2.12-3.1.1.jar"
                - name: globalServiceAccount
                  value: "spark-operator-spark"
                - name: namespace
                  value: "455b96eb-7e7a-4734-926a-7529a95d757b"
                - name: driverCoreRequest
                  value: "100m"
                - name: executorCoreRequest
                  value: "100m"

          - name: test-spark-connector-python
            depends: "test-spark-connector-jvm"
            templateRef:
              name: spark-data-connector-python
              template: spark
              clusterScope: true
            arguments:
              parameters:
                - name: globalImage
                  value: "gcr.io/spark-operator/spark-py:v3.1.1"
                - name: mainApplicationFile
                  value: "local:///opt/spark/examples/src/main/python/pi.py"
                - name: globalServiceAccount
                  value: "spark-operator-spark"
                - name: namespace
                  value: "455b96eb-7e7a-4734-926a-7529a95d757b"
                - name: driverCoreRequest
                  value: "100m"
                - name: executorCoreRequest
                  value: "100m"

